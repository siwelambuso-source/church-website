<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=1.0">
  <meta name="theme-color" content="#0a2f44">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MPAC DataHub | Mpolonjeni Alliance Church</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary-red: #c62828;
      --primary-blue: #0a2f44;
      --primary-gold: #f5b042;
      --radius-lg: 28px;
      --radius-md: 20px;
      --shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    body { font-family: 'Inter', sans-serif; background: #fcfaf7; padding-bottom: 80px; color: #1e293b; }
    .container { max-width: 750px; margin: 0 auto; padding: 16px; }
    
    /* Header Styles */
    .app-header { background: var(--primary-blue); color: white; padding: 16px 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .header-flex { display: flex; align-items: center; justify-content: space-between; max-width: 750px; margin: 0 auto; }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary-gold); }
    
    /* Navigation */
    .tab-nav { display: flex; gap: 8px; padding: 6px; background: white; border-radius: 80px; margin: 20px 0; box-shadow: var(--shadow); }
    .tab-btn { flex: 1; border: none; padding: 12px; border-radius: 60px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; color: #64748b; background: transparent; }
    .tab-btn.active { background: var(--primary-red); color: white; }

    /* Cards */
    .card { background: white; border-radius: var(--radius-lg); margin-bottom: 20px; box-shadow: var(--shadow); overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
    .card-header { padding: 16px 20px; color: white; display: flex; align-items: center; gap: 10px; font-weight: 700; }
    .header-att { background: linear-gradient(135deg, #1565C0, #0d47a1); }
    .header-dash { background: linear-gradient(135deg, #c62828, #8b0000); }
    .card-body { padding: 20px; }

    /* Forms */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 700; font-size: 0.75rem; margin-bottom: 6px; text-transform: uppercase; color: #475569; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; }
    .gender-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #f8fafc; padding: 15px; border-radius: 15px; margin-top: 10px; }
    
    /* Dashboard Elements */
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: white; padding: 20px; border-radius: 20px; text-align: center; border-bottom: 4px solid var(--primary-gold); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .kpi-val { font-size: 1.8rem; font-weight: 800; color: var(--primary-red); }
    .chart-box { background: white; border-radius: 24px; padding: 15px; margin-bottom: 20px; height: 320px; box-shadow: var(--shadow); }

    .btn-save { background: var(--primary-red); color: white; width: 100%; padding: 16px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; font-size: 1rem; margin-top: 10px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 25px; border-radius: 50px; z-index: 9999; display: none; font-weight: 600; }
    .hidden { display: none; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <div class="app-header">
    <div class="header-flex">
      <div class="logo-area">
        <img src="https://i.imgur.com/kTumLOY.jpg" class="logo-img">
        <div>
          <h1 style="font-size: 1.1rem;">MPAC DataHub</h1>
          <p style="font-size: 0.6rem; opacity: 0.8;">Mpolonjeni Alliance Church Analytics</p>
        </div>
      </div>
      <div id="statusIndicator" style="font-size: 0.7rem;"><i class="fas fa-circle" style="color: #4ade80;"></i> Online</div>
    </div>
  </div>

  <div class="container">
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="record"><i class="fas fa-edit"></i> Record</button>
      <button class="tab-btn" data-tab="dashboard"><i class="fas fa-chart-line"></i> Dashboard</button>
      <button class="tab-btn" data-tab="database"><i class="fas fa-database"></i> Database</button>
    </div>

    <div id="recordTab" class="tab-content active">
      <div class="card">
        <div class="card-header header-att"><i class="fas fa-plus-circle"></i> Submit Data</div>
        <div class="card-body">
          <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="showAtt" class="tab-btn active" style="font-size: 0.7rem;">Attendance</button>
            <button id="showMeet" class="tab-btn" style="font-size: 0.7rem; background: #f1f5f9;">Meetings</button>
          </div>

          <form id="attendanceForm">
            <div class="form-group"><label>Service Date</label><input type="date" id="attDate" required></div>
            <div class="form-group">
              <label>Select Ministry</label>
              <select id="ministrySelect" required>
                <option value="">-- Choose Ministry --</option>
                <option value="sundaySchool">Sunday School</option>
                <option value="ladies">Ladies Fellowship</option>
                <option value="men">Men's Fellowship</option>
                <option value="youth">Youth Fellowship</option>
                <option value="wednesday">Wednesday Prayer</option>
                <option value="sunday">Sunday Service</option>
                <option value="visitors">Visitors</option>
              </select>
            </div>
            <div class="form-group"><label>Sermon Topic / Activity</label><input type="text" id="topic" placeholder="Main message or theme"></div>
            
            <div id="counterSection" class="hidden">
              <p style="font-size: 0.75rem; font-weight: 800; color: var(--primary-blue);">GENDER BREAKDOWN</p>
              <div class="gender-grid">
                <div><label>Male</label><input type="number" id="mCount" value="0" min="0"></div>
                <div><label>Female</label><input type="number" id="fCount" value="0" min="0"></div>
              </div>
            </div>

            <div class="form-group" style="margin-top: 15px;"><label>Offering (E)</label><input type="number" step="0.01" id="offering" value="0"></div>
            <button type="submit" class="btn-save" id="saveAttBtn">Save Attendance</button>
          </form>

          <form id="meetingForm" class="hidden">
            <div class="form-group"><label>Meeting Date</label><input type="date" id="meetDate" required></div>
            <div class="form-group">
              <label>Committee</label>
              <select id="meetType">
                <option>LCB</option><option>Women's Committee</option><option>Men's Committee</option><option>Youth Committee</option><option>Project Committee</option>
              </select>
            </div>
            <div class="form-group"><label>Attendees</label><input type="number" id="meetAttendees" required></div>
            <div class="form-group"><label>Key Resolutions</label><textarea id="meetOutcomes" rows="3"></textarea></div>
            <button type="submit" class="btn-save" id="saveMeetBtn" style="background: var(--primary-blue);">Save Meeting Report</button>
          </form>
        </div>
      </div>
    </div>

    <div id="dashboardTab" class="tab-content">
      <div class="kpi-row" id="kpiContainer"></div>
      <div class="chart-box"><canvas id="ministryChart"></canvas></div>
      <div class="chart-box"><canvas id="trendChart"></canvas></div>
      <div class="chart-box"><canvas id="genderChart"></canvas></div>
    </div>

    <div id="databaseTab" class="tab-content">
      <div class="card">
        <div class="card-body">
          <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="font-size: 0.9rem;">Cloud Sync Records</h3>
            <button onclick="fetchCloudData()" class="tab-btn" style="width: auto; padding: 8px 15px; font-size: 0.65rem; background: #e2e8f0;"><i class="fas fa-sync"></i> Refresh</button>
          </div>
          <div id="cloudTable" style="overflow-x: auto; font-size: 0.7rem;"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbiApPBE7MFoHN5G6rsU12NiOdo48IYszDBadnZIVVXvL5hrHzC5nB7-ksD3kZJgyDyg/exec";
    let masterData = [];

    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display='none', 3000); }

    // Navigation Logic
    document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
        if(btn.dataset.tab === 'dashboard') initCharts();
      });
    });

    // Form Toggle Logic
    document.getElementById('showAtt').addEventListener('click', () => {
      document.getElementById('attendanceForm').classList.remove('hidden');
      document.getElementById('meetingForm').classList.add('hidden');
      document.getElementById('showAtt').classList.add('active');
      document.getElementById('showMeet').classList.remove('active');
      document.getElementById('showMeet').style.background = "#f1f5f9";
    });

    document.getElementById('showMeet').addEventListener('click', () => {
      document.getElementById('attendanceForm').classList.add('hidden');
      document.getElementById('meetingForm').classList.remove('hidden');
      document.getElementById('showMeet').classList.add('active');
      document.getElementById('showAtt').classList.remove('active');
      document.getElementById('showAtt').style.background = "#f1f5f9";
    });

    document.getElementById('ministrySelect').addEventListener('change', (e) => {
      document.getElementById('counterSection').classList.toggle('hidden', !e.target.value);
    });

    // Data Submission
    document.getElementById('attendanceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveAttBtn');
      btn.disabled = true; btn.innerText = "Syncing...";
      
      const payload = {
        type: 'attendance',
        data: {
          date: document.getElementById('attDate').value,
          topic: document.getElementById('topic').value || "Service",
          ministry: document.getElementById('ministrySelect').value,
          male: parseInt(document.getElementById('mCount').value) || 0,
          female: parseInt(document.getElementById('fCount').value) || 0,
          offering: parseFloat(document.getElementById('offering').value) || 0
        }
      };

      try {
        const resp = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        showToast("✨ Data saved to Google Drive!");
        document.getElementById('attendanceForm').reset();
        fetchCloudData();
      } catch (err) { showToast("⚠️ Connection failed"); }
      finally { btn.disabled = false; btn.innerText = "Save Attendance"; }
    });

    // Pull Data from Cloud
    async function fetchCloudData() {
      try {
        const resp = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'pull' })
        });
        const result = await resp.json();
        if(result.status === 'success') {
          masterData = result.attendance;
          renderTable();
          updateKPIs();
        }
      } catch (err) { console.error("Pull failed"); }
    }

    function renderTable() {
      let html = `<table style="width:100%; border-collapse:collapse;"><thead><tr style="background:#f1f5f9;"><th style="padding:10px;text-align:left;">Date</th><th style="padding:10px;text-align:left;">Topic</th><th style="padding:10px;text-align:left;">Total</th></tr></thead><tbody>`;
      masterData.slice(-15).reverse().forEach(r => {
        html += `<tr style="border-bottom:1px solid #eee;"><td style="padding:10px;">${r.date}</td><td style="padding:10px;">${r.topic}</td><td style="padding:10px;">${r.total}</td></tr>`;
      });
      document.getElementById('cloudTable').innerHTML = html + `</tbody></table>`;
    }

    function updateKPIs() {
      const total = masterData.reduce((sum, r) => sum + (r.total || 0), 0);
      const offering = masterData.reduce((sum, r) => sum + (parseFloat(r.offering) || 0), 0);
      document.getElementById('kpiContainer').innerHTML = `
        <div class="kpi-card"><div class="kpi-val">${total}</div><div style="font-size:0.6rem;">Total Attendance</div></div>
        <div class="kpi-card"><div class="kpi-val">E${offering.toFixed(2)}</div><div style="font-size:0.6rem;">Total Offering</div></div>
        <div class="kpi-card"><div class="kpi-val">${masterData.length}</div><div style="font-size:0.6rem;">Total Records</div></div>
      `;
    }

    // Charting Logic
    let charts = {};
    function initCharts() {
      Chart.register(ChartDataLabels);
      const ctx1 = document.getElementById('ministryChart').getContext('2d');
      if(charts.min) charts.min.destroy();
      charts.min = new Chart(ctx1, {
        type: 'bar',
        data: {
          labels: ['Sunday', 'Youth', 'Ladies', 'Men', 'SS', 'Wed'],
          datasets: [{ label: 'Recent Attendance', data: [/* data mapping here */], backgroundColor: '#1e4a6e', borderRadius: 8 }]
        },
        options: { maintainAspectRatio: false, plugins: { datalabels: { color: '#fff' } } }
      });
    }

    // Initial Load
    document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('meetDate').value = new Date().toISOString().split('T')[0];
    fetchCloudData();

  </script>
</body>
</html>
