<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=1.0">
  <meta name="theme-color" content="#0a2f44">
  <title>MPAC DataHub | Mpolonjeni Alliance Church - Ultimate Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary-red: #ef4444;
      --primary-red-dark: #dc2626;
      --primary-blue: #0f3b5c;
      --primary-gold: #fbbf24;
      --primary-gold-dark: #f59e0b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(139,92,246,0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(236,72,153,0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
    
    /* GLAMOROUS HEADER */
    .glam-header {
      background: linear-gradient(135deg, rgba(15,12,41,0.9), rgba(48,43,99,0.9));
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 28px 40px;
      margin-bottom: 32px;
      border: 1px solid rgba(251,191,36,0.3);
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(251,191,36,0.2); }
      50% { box-shadow: 0 25px 45px -12px rgba(251,191,36,0.3), 0 0 0 2px rgba(251,191,36,0.5); }
    }
    .glam-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
    .logo-glam { display: flex; align-items: center; gap: 20px; }
    .logo-3d {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, var(--primary-gold), var(--primary-gold-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: rotate3d 8s infinite linear;
    }
    @keyframes rotate3d {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    .logo-3d img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
    .title-glam h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #fbbf24, #f59e0b, #ec489a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .title-glam p { font-size: 0.7rem; color: rgba(255,255,255,0.7); letter-spacing: 3px; }
    .sync-glam {
      background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(236,72,153,0.2));
      padding: 10px 24px;
      border-radius: 60px;
      border: 1px solid rgba(251,191,36,0.5);
      backdrop-filter: blur(10px);
    }
    
    /* TABS */
    .tabs-glam {
      display: flex;
      gap: 15px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 80px;
      padding: 8px;
      margin-bottom: 32px;
    }
    .tab-glam {
      flex: 1;
      background: transparent;
      border: none;
      padding: 16px 12px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.7);
      transition: all 0.4s;
    }
    .tab-glam.active {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: white;
      box-shadow: 0 10px 30px rgba(239,68,68,0.4);
    }
    .tab-glam:hover:not(.active) { background: rgba(251,191,36,0.2); color: var(--primary-gold); }
    
    /* CARDS */
    .card-glam {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      margin-bottom: 28px;
      overflow: hidden;
      border: 1px solid rgba(251,191,36,0.2);
      transition: all 0.4s;
    }
    .card-glam:hover { transform: translateY(-5px); border-color: rgba(251,191,36,0.5); }
    .card-header-glam {
      padding: 20px 28px;
      background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(236,72,153,0.1));
      border-bottom: 2px solid var(--primary-gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-header-glam h2 { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; color: white; }
    .card-body-glam { padding: 28px; }
    
    /* FORM STYLES - LARGER FONTS & BOLD */
    .form-group-glam { margin-bottom: 22px; }
    .form-group-glam label { 
      font-weight: 800; 
      font-size: 0.85rem; 
      display: block; 
      margin-bottom: 8px; 
      color: var(--primary-gold); 
      text-transform: uppercase; 
      letter-spacing: 2px;
    }
    .form-group-glam input, .form-group-glam select, .form-group-glam textarea {
      width: 100%; 
      padding: 16px 22px; 
      background: rgba(0,0,0,0.5); 
      border: 2px solid rgba(251,191,36,0.4); 
      border-radius: 28px; 
      font-size: 1.1rem;
      font-weight: 700;
      color: white; 
      transition: all 0.3s;
    }
    .form-group-glam input:focus, .form-group-glam select:focus, .form-group-glam textarea:focus {
      border-color: var(--primary-gold);
      outline: none;
      box-shadow: 0 0 0 4px rgba(251,191,36,0.2);
    }
    .form-group-glam input::placeholder, .form-group-glam textarea::placeholder { color: rgba(255,255,255,0.4); font-weight: 500; }
    
    /* GOLDEN MINISTRY SELECT */
    .golden-select {
      background: linear-gradient(135deg, rgba(251,191,36,0.25), rgba(245,158,11,0.35)) !important;
      border: 2px solid var(--primary-gold) !important;
      color: var(--primary-gold) !important;
      font-weight: 800 !important;
      font-size: 1.1rem !important;
    }
    .golden-select option {
      background: #1e1b3c;
      color: white;
    }
    
    .btn-glam {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: white; 
      border: none; 
      padding: 18px 28px; 
      border-radius: 60px; 
      font-weight: 800; 
      font-size: 1.2rem;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer; 
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-glam::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 200%;
      height: 200%;
      background: linear-gradient(transparent, rgba(255,255,255,0.2), transparent);
      transform: rotate(45deg);
      transition: all 0.6s;
    }
    .btn-glam:hover::after { left: 100%; }
    .btn-glam:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-glam:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 10px 30px rgba(239,68,68,0.4); }
    
    .btn-secondary-glam {
      background: linear-gradient(135deg, #0f3b5c, #1e4a6e);
      color: white; 
      border: none; 
      padding: 12px 24px; 
      border-radius: 50px; 
      font-weight: 700; 
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn-secondary-glam:hover { transform: translateY(-2px); background: linear-gradient(135deg, #f59e0b, #d97706); }
    
    .activity-toggle-glam {
      display: flex;
      gap: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 60px;
      padding: 6px;
      margin-bottom: 28px;
    }
    .activity-opt-glam {
      flex: 1;
      text-align: center;
      padding: 14px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      transition: all 0.3s;
    }
    .activity-opt-glam.active {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: white;
    }
    
    .gender-grid-glam { display: flex; gap: 20px; margin: 20px 0; }
    .gender-card-glam { 
      flex: 1; 
      background: rgba(255,255,255,0.1); 
      border-radius: 28px; 
      padding: 24px; 
      text-align: center; 
      border: 1px solid rgba(251,191,36,0.3);
    }
    .gender-card-glam .gender-label { 
      font-size: 1.1rem; 
      font-weight: 800; 
      margin-bottom: 15px; 
      color: var(--primary-gold);
    }
    .gender-card-glam input { 
      width: 100%; 
      padding: 16px; 
      border-radius: 50px; 
      text-align: center; 
      background: rgba(0,0,0,0.5); 
      border: 2px solid rgba(251,191,36,0.5); 
      color: white;
      font-size: 1.5rem;
      font-weight: 800;
    }
    
    .kpi-grid-glam { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .kpi-card-glam {
      background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(236,72,153,0.1));
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 20px;
      flex: 1;
      text-align: center;
      border: 1px solid rgba(251,191,36,0.3);
    }
    .kpi-value-glam { 
      font-size: 2.5rem; 
      font-weight: 900; 
      background: linear-gradient(135deg, #fbbf24, #ec489a); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent;
    }
    .kpi-card-glam div:last-child { font-weight: 700; font-size: 0.9rem; margin-top: 8px; color: rgba(255,255,255,0.9); }
    
    .chart-box-glam { height: 300px; margin: 20px 0; background: rgba(0,0,0,0.3); border-radius: 24px; padding: 15px; }
    .filter-bar-glam { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-select-glam { flex: 1; padding: 14px; border-radius: 40px; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(251,191,36,0.3); font-weight: 600; font-size: 0.9rem; }
    
    .data-table-glam { overflow-x: auto; }
    .data-table-glam table { width: 100%; border-collapse: collapse; }
    .data-table-glam th, .data-table-glam td { padding: 14px 12px; text-align: left; border-bottom: 1px solid rgba(251,191,36,0.2); color: white; font-weight: 500; }
    .data-table-glam th { background: rgba(251,191,36,0.2); font-weight: 800; font-size: 0.9rem; }
    .data-table-glam td { font-size: 0.9rem; }
    
    .pagination-glam { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
    .page-btn-glam { background: linear-gradient(135deg, #0f3b5c, #1e4a6e); color: white; border: none; padding: 10px 28px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 0.9rem; }
    .page-btn-glam:hover:not(:disabled) { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .page-btn-glam:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .toast-glam {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      padding: 14px 28px;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 2000;
      display: none;
      border: 1px solid var(--primary-gold);
    }
    .spinner-glam { display: inline-block; width: 1.2rem; height: 1.2rem; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .empty-state-glam { text-align: center; padding: 50px; color: rgba(255,255,255,0.6); font-size: 1rem; font-weight: 500; }
    
    @media (max-width: 768px) { .container { padding: 12px; } .gender-grid-glam { flex-direction: column; } .tab-glam { font-size: 0.7rem; padding: 10px 6px; } .btn-glam { font-size: 1rem; padding: 14px 20px; } }
  </style>
</head>
<body>

<div class="container">
  <div class="glam-header">
    <div class="glam-content">
      <div class="logo-glam">
        <div class="logo-3d"><img src="https://i.imgur.com/kTumLOY.jpg" alt="MPAC"></div>
        <div class="title-glam">
          <h1>MPAC DataHub</h1>
          <p>MPOLONJENI ALLIANCE CHURCH • ULTIMATE EDITION</p>
        </div>
      </div>
      <div class="sync-glam"><i class="fas fa-cloud-upload-alt"></i> GOOGLE DRIVE SYNC</div>
    </div>
  </div>

  <div class="tabs-glam">
    <button class="tab-glam active" data-tab="record"><i class="fas fa-crown"></i> RECORD</button>
    <button class="tab-glam" data-tab="dashboard"><i class="fas fa-chart-line"></i> DASHBOARD</button>
    <button class="tab-glam" data-tab="data"><i class="fas fa-database"></i> ALL DATA</button>
  </div>

  <!-- RECORD TAB -->
  <div id="recordTab" class="tab-pane active">
    <div class="card-glam">
      <div class="card-header-glam"><h2><i class="fas fa-crown"></i> Divine Data Entry</h2></div>
      <div class="card-body-glam">
        <div class="activity-toggle-glam">
          <div class="activity-opt-glam active" data-type="attendance"><i class="fas fa-users"></i> Attendance</div>
          <div class="activity-opt-glam" data-type="meeting"><i class="fas fa-chalkboard"></i> Meeting Report</div>
        </div>

        <div id="attendanceForm">
          <div class="form-group-glam"><label>📅 DATE</label><input type="date" id="attDate" value="2026-03-27"></div>
          <div class="form-group-glam"><label>⛪ MINISTRY</label>
            <select id="ministrySelect" class="golden-select">
              <option value="">-- Select Ministry --</option>
              <option value="sundaySchool">🏫 Sunday School</option><option value="ladies">👩 Ladies Fellowship</option>
              <option value="men">👨 Men's Fellowship</option><option value="youth">🎉 Youth Fellowship</option>
              <option value="wednesday">🙏 Wednesday Prayer</option><option value="sunday">⛪ Sunday Service</option>
              <option value="visitors">🤝 Visitors / Guests</option>
            </select>
          </div>
          <div class="form-group-glam" id="topicGroup"><label>📖 TOPIC / SERMON</label><input type="text" id="topic" placeholder="Enter the sermon topic"></div>
          <div id="genderSection" style="background:rgba(251,191,36,0.1); padding:20px; border-radius:28px; margin:20px 0;">
            <h3 id="ministryName" style="margin-bottom:15px; color:var(--primary-gold); font-weight:800;">Sunday School</h3>
            <div class="gender-grid-glam">
              <div class="gender-card-glam"><div class="gender-label"><i class="fas fa-male"></i> MALE</div><input type="number" id="maleCount" value="0" min="0"></div>
              <div class="gender-card-glam"><div class="gender-label"><i class="fas fa-female"></i> FEMALE</div><input type="number" id="femaleCount" value="0" min="0"></div>
            </div>
          </div>
          <input type="hidden" id="ssMale" value="0"><input type="hidden" id="ssFemale" value="0">
          <input type="hidden" id="lfMale" value="0"><input type="hidden" id="lfFemale" value="0">
          <input type="hidden" id="mfMale" value="0"><input type="hidden" id="mfFemale" value="0">
          <input type="hidden" id="yfMale" value="0"><input type="hidden" id="yfFemale" value="0">
          <input type="hidden" id="wpMale" value="0"><input type="hidden" id="wpFemale" value="0">
          <input type="hidden" id="sunMale" value="0"><input type="hidden" id="sunFemale" value="0">
          <input type="hidden" id="visitorsMale" value="0"><input type="hidden" id="visitorsFemale" value="0">
          <button id="saveAttendanceBtn" class="btn-glam"><i class="fas fa-save"></i> SAVE</button>
        </div>

        <div id="meetingForm" class="hidden">
          <div class="form-group-glam"><label>📅 DATE</label><input type="date" id="meetingDate" value="2026-03-27"></div>
          <div class="form-group-glam"><label>👥 COMMITTEE</label>
            <select id="meetingType" class="golden-select">
              <option>Women's Committee</option><option>Men's Committee</option><option>Youth Committee</option>
              <option>Sunday School Committee</option><option>Project Committee</option><option>LCB</option><option>Social Committee</option>
            </select>
          </div>
          <div class="form-group-glam"><label>🎯 OBJECTIVES</label><textarea id="meetingObjectives" rows="2"></textarea></div>
          <div class="form-group-glam"><label>👥 ATTENDANCE</label><input type="number" id="meetingAttendance" min="0"></div>
          <div class="form-group-glam"><label>🏆 OUTCOMES</label><textarea id="meetingOutcomes" rows="2"></textarea></div>
          <button id="saveMeetingBtn" class="btn-glam"><i class="fas fa-save"></i> SAVE</button>
        </div>
      </div>
    </div>

    <div class="card-glam">
      <div class="card-header-glam"><h2><i class="fas fa-history"></i> Recent Records</h2></div>
      <div class="card-body-glam">
        <div id="recentAttendance"></div>
        <div style="margin:20px 0"><hr style="border-color:rgba(251,191,36,0.3);"></div>
        <div id="recentMeetings"></div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD TAB -->
  <div id="dashboardTab" class="tab-pane hidden">
    <div class="card-glam">
      <div class="card-header-glam"><h2><i class="fas fa-chart-line"></i> Attendance Analytics</h2></div>
      <div class="card-body-glam">
        <div class="filter-bar-glam">
          <select id="yearFilter" class="filter-select-glam"><option value="all">All Years</option></select>
          <select id="monthFilter" class="filter-select-glam"><option value="all">All Months</option></select>
          <select id="ministryFilter" class="filter-select-glam"><option value="all">All Ministries</option></select>
          <button id="applyFilters" class="btn-secondary-glam">Apply</button>
        </div>
        <div id="attKpi" class="kpi-grid-glam"></div>
        <div class="chart-box-glam"><canvas id="ministryChart"></canvas></div>
        <div class="chart-box-glam"><canvas id="trendChart"></canvas></div>
        <div class="chart-box-glam"><canvas id="genderChart"></canvas></div>
      </div>
    </div>
    <div class="card-glam">
      <div class="card-header-glam"><h2><i class="fas fa-calendar-alt"></i> Meetings Analytics</h2></div>
      <div class="card-body-glam">
        <div class="filter-bar-glam">
          <select id="meetYearFilter" class="filter-select-glam"><option value="all">All Years</option></select>
          <select id="meetMonthFilter" class="filter-select-glam"><option value="all">All Months</option></select>
          <select id="committeeFilter" class="filter-select-glam"><option value="all">All Committees</option></select>
          <button id="applyMeetFilters" class="btn-secondary-glam">Apply</button>
        </div>
        <div id="meetKpi" class="kpi-grid-glam"></div>
        <div class="chart-box-glam"><canvas id="meetChart"></canvas></div>
        <div class="chart-box-glam"><canvas id="meetTrendChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ALL DATA TAB -->
  <div id="dataTab" class="tab-pane hidden">
    <div class="card-glam">
      <div class="card-header-glam"><h2><i class="fas fa-database"></i> Eternal Archive</h2></div>
      <div class="card-body-glam">
        <div style="display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
          <button id="refreshData" class="btn-secondary-glam"><i class="fas fa-sync-alt"></i> Refresh</button>
          <button id="fetchGoogleData" class="btn-secondary-glam" style="background:linear-gradient(135deg,#f59e0b,#d97706);"><i class="fab fa-google-drive"></i> Fetch from Google Drive</button>
          <button id="exportExcel" class="btn-secondary-glam" style="background:linear-gradient(135deg,#10b981,#059669);"><i class="fas fa-file-excel"></i> Export Excel</button>
        </div>
        <div id="dataStats" style="background:rgba(0,0,0,0.3); padding:15px; border-radius:20px; margin-bottom:20px;"></div>
        <h3 style="color:var(--primary-gold); font-weight:800;">📋 Attendance Records</h3>
        <div id="attTable" class="data-table-glam"></div>
        <div id="attPagination" class="pagination-glam"></div>
        <h3 style="margin-top:30px; color:var(--primary-gold); font-weight:800;">📋 Meeting Records</h3>
        <div id="meetTable" class="data-table-glam"></div>
        <div id="meetPagination" class="pagination-glam"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-glam" id="toast">✨ MPAC DataHub Ultimate Ready</div>

<script>
  Chart.register(ChartDataLabels);
  Chart.defaults.set('plugins.datalabels', { color: '#fff', anchor: 'end', align: 'top', offset: 4, font: { weight: 'bold', size: 12 } });
  
  const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7xC0diTHCScyoZSdT8nm7Hru0fqmJP2bdVOpxpVmD4EtLUiHu-VzFnbs6hgHHfaMDGiWLej38GwKg/pub?output=csv";
  const GOOGLE_PUSH_URL = "https://script.google.com/macros/s/AKfycbzL2hL9OlyHlGPW3N3PHOJg84NokcYQ67iTiFGVH8pxGDOdRZ1cunnm78NiYH_380dXFA/exec";
  
  let db = null;
  let allAttendance = [], allMeetings = [];
  let attPage = 1, meetPage = 1, attTotal = 1, meetTotal = 1;
  let ministryChart, trendChart, genderChart, meetChart, meetTrendChart;
  let isSaving = false;
  
  function showToast(msg) { let t = document.getElementById("toast"); t.innerText = msg; t.style.display = "block"; setTimeout(() => t.style.display = "none", 2500); }
  
  function openDB() {
    return new Promise((resolve) => {
      let req = indexedDB.open("MPAC_Ultimate_V3", 1);
      req.onupgradeneeded = (e) => {
        let d = e.target.result;
        if(!d.objectStoreNames.contains("attendance")) d.createObjectStore("attendance", { keyPath: "id", autoIncrement: true });
        if(!d.objectStoreNames.contains("meetings")) d.createObjectStore("meetings", { keyPath: "id", autoIncrement: true });
      };
      req.onsuccess = () => { db = req.result; resolve(db); };
      req.onerror = () => resolve(null);
    });
  }
  
  async function getAll(store) {
    if(!db) return [];
    return new Promise((resolve) => {
      let tx = db.transaction([store], "readonly");
      tx.objectStore(store).getAll().onsuccess = e => resolve(e.target.result || []);
    });
  }
  
  async function addItem(store, data) {
    if(!db) return null;
    return new Promise((resolve) => {
      let tx = db.transaction([store], "readwrite");
      let req = tx.objectStore(store).add({ ...data, createdAt: new Date().toISOString() });
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
  }
  
  async function deleteItem(store, id) {
    let tx = db.transaction([store], "readwrite");
    tx.objectStore(store).delete(id);
    await tx.complete;
  }
  
  async function pushToGoogleDrive(data, type) {
    try {
      await fetch(GOOGLE_PUSH_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, data, timestamp: new Date().toISOString(), church: "MPAC", deviceId: localStorage.getItem("deviceId") || "web_app" })
      });
      return true;
    } catch(e) { return false; }
  }
  
  const ministryMap = {
    sundaySchool: { maleId: "ssMale", femaleId: "ssFemale", title: "Sunday School", showTopic: true },
    ladies: { maleId: "lfMale", femaleId: "lfFemale", title: "Ladies Fellowship", showTopic: true },
    men: { maleId: "mfMale", femaleId: "mfFemale", title: "Men's Fellowship", showTopic: true },
    youth: { maleId: "yfMale", femaleId: "yfFemale", title: "Youth Fellowship", showTopic: true },
    wednesday: { maleId: "wpMale", femaleId: "wpFemale", title: "Wednesday Prayer", showTopic: true },
    sunday: { maleId: "sunMale", femaleId: "sunFemale", title: "Sunday Service", showTopic: true },
    visitors: { maleId: "visitorsMale", femaleId: "visitorsFemale", title: "Visitors / Guests", showTopic: false }
  };
  let currentMinistry = "";
  const ms = document.getElementById("ministrySelect");
  const genderSec = document.getElementById("genderSection");
  const topicGroup = document.getElementById("topicGroup");
  const maleInput = document.getElementById("maleCount");
  const femaleInput = document.getElementById("femaleCount");
  
  ms.addEventListener("change", () => {
    let val = ms.value;
    if(val && ministryMap[val]) {
      let cfg = ministryMap[val];
      document.getElementById("ministryName").innerHTML = cfg.title;
      genderSec.classList.remove("hidden");
      topicGroup.style.display = cfg.showTopic ? "block" : "none";
      if(!cfg.showTopic) document.getElementById("topic").value = "";
      maleInput.value = document.getElementById(cfg.maleId).value || 0;
      femaleInput.value = document.getElementById(cfg.femaleId).value || 0;
      currentMinistry = val;
    } else {
      genderSec.classList.add("hidden");
      topicGroup.style.display = "block";
    }
  });
  
  function updateMinistryFields() {
    if(currentMinistry && ministryMap[currentMinistry]) {
      let cfg = ministryMap[currentMinistry];
      document.getElementById(cfg.maleId).value = maleInput.value;
      document.getElementById(cfg.femaleId).value = femaleInput.value;
    }
  }
  maleInput.addEventListener("input", updateMinistryFields);
  femaleInput.addEventListener("input", updateMinistryFields);
  
  const saveAttBtn = document.getElementById("saveAttendanceBtn");
  saveAttBtn.addEventListener("click", async () => {
    if(isSaving) { showToast("Please wait..."); return; }
    let ministry = ms.value;
    if(!ministry) { showToast("❌ Select a ministry"); return; }
    let cfg = ministryMap[ministry];
    let topic = document.getElementById("topic").value;
    if(cfg.showTopic && !topic.trim()) { showToast("📖 Enter a topic"); return; }
    updateMinistryFields();
    
    let data = {
      date: document.getElementById("attDate").value,
      topic: cfg.showTopic ? topic : "(Visitors)",
      ministries: {
        sundaySchool: { male: parseInt(document.getElementById("ssMale").value)||0, female: parseInt(document.getElementById("ssFemale").value)||0 },
        ladies: { male: parseInt(document.getElementById("lfMale").value)||0, female: parseInt(document.getElementById("lfFemale").value)||0 },
        men: { male: parseInt(document.getElementById("mfMale").value)||0, female: parseInt(document.getElementById("mfFemale").value)||0 },
        youth: { male: parseInt(document.getElementById("yfMale").value)||0, female: parseInt(document.getElementById("yfFemale").value)||0 },
        wedPrayer: { male: parseInt(document.getElementById("wpMale").value)||0, female: parseInt(document.getElementById("wpFemale").value)||0 },
        sundayService: { male: parseInt(document.getElementById("sunMale").value)||0, female: parseInt(document.getElementById("sunFemale").value)||0 },
        visitors: { male: parseInt(document.getElementById("visitorsMale").value)||0, female: parseInt(document.getElementById("visitorsFemale").value)||0 }
      }
    };
    
    isSaving = true;
    saveAttBtn.disabled = true;
    const originalHtml = saveAttBtn.innerHTML;
    saveAttBtn.innerHTML = '<span class="spinner-glam"></span> SAVING...';
    
    try {
      let saved = await addItem("attendance", data);
      if(saved) {
        await pushToGoogleDrive(data, "attendance");
        let total = 0;
        for(let key in data.ministries) total += data.ministries[key].male + data.ministries[key].female;
        showToast(`✅ ${cfg.title} saved! Total: ${total} people • Synced to Google Drive`);
        
        document.getElementById("attDate").value = new Date().toISOString().slice(0,10);
        ms.value = "";
        document.getElementById("topic").value = "";
        genderSec.classList.add("hidden");
        maleInput.value = "0";
        femaleInput.value = "0";
        ["ssMale","ssFemale","lfMale","lfFemale","mfMale","mfFemale","yfMale","yfFemale","wpMale","wpFemale","sunMale","sunFemale","visitorsMale","visitorsFemale"].forEach(id => {
          let el = document.getElementById(id); if(el) el.value = "0";
        });
        topicGroup.style.display = "block";
        await loadAllData();
        await renderRecent();
      } else { showToast("❌ Save failed"); }
    } catch(e) { showToast("Error: " + e.message); }
    finally {
      isSaving = false;
      saveAttBtn.disabled = false;
      saveAttBtn.innerHTML = originalHtml;
    }
  });
  
  const saveMeetBtn = document.getElementById("saveMeetingBtn");
  saveMeetBtn.addEventListener("click", async () => {
    if(isSaving) { showToast("Please wait..."); return; }
    let attendanceVal = parseInt(document.getElementById("meetingAttendance").value);
    if(isNaN(attendanceVal)) { showToast("❌ Enter valid attendance"); return; }
    
    let data = {
      type: document.getElementById("meetingType").value,
      date: document.getElementById("meetingDate").value,
      objectives: document.getElementById("meetingObjectives").value,
      attendance: attendanceVal,
      outcomes: document.getElementById("meetingOutcomes").value
    };
    
    isSaving = true;
    saveMeetBtn.disabled = true;
    const originalHtml = saveMeetBtn.innerHTML;
    saveMeetBtn.innerHTML = '<span class="spinner-glam"></span> SAVING...';
    
    try {
      let saved = await addItem("meetings", data);
      if(saved) {
        await pushToGoogleDrive(data, "meeting");
        showToast(`✅ Meeting saved & synced to Google Drive!`);
        document.getElementById("meetingDate").value = new Date().toISOString().slice(0,10);
        document.getElementById("meetingObjectives").value = "";
        document.getElementById("meetingAttendance").value = "";
        document.getElementById("meetingOutcomes").value = "";
        await loadAllData();
        await renderRecent();
      } else { showToast("❌ Save failed"); }
    } catch(e) { showToast("Error: " + e.message); }
    finally {
      isSaving = false;
      saveMeetBtn.disabled = false;
      saveMeetBtn.innerHTML = originalHtml;
    }
  });
  
  window.delAtt = async(id) => { await deleteItem("attendance", id); loadAllData(); renderRecent(); showToast("Record deleted"); };
  window.delMeet = async(id) => { await deleteItem("meetings", id); loadAllData(); renderRecent(); showToast("Record deleted"); };
  
  async function renderRecent() {
    let att = await getAll("attendance");
    let meet = await getAll("meetings");
    
    if(att.length === 0) {
      document.getElementById("recentAttendance").innerHTML = '<div class="empty-state-glam">📭 No attendance records yet</div>';
    } else {
      let html = `<table style="width:100%"><thead><th>Date</th><th>Topic</th><th>Total</th><th></th></thead><tbody>`;
      att.slice(-6).reverse().forEach(r => {
        let t = 0; if(r.ministries) for(let k in r.ministries) t += (r.ministries[k]?.male||0) + (r.ministries[k]?.female||0);
        html += `tr\n<td style="font-weight:600;">${r.date}</td><td style="font-weight:500;">${r.topic?.slice(0,25)||'-'}</td><td style="font-weight:700;color:#fbbf24;">${t}</td><td><button onclick="delAtt(${r.id})" style="background:#ef4444; border:none; border-radius:20px; padding:6px 14px; color:white; cursor:pointer; font-weight:600;">🗑️</button></td></tr>`;
      });
      html += `</tbody></table>`;
      document.getElementById("recentAttendance").innerHTML = html;
    }
    
    if(meet.length === 0) {
      document.getElementById("recentMeetings").innerHTML = '<div class="empty-state-glam">📭 No meeting records yet</div>';
    } else {
      let html = `<table style="width:100%"><thead><th>Date</th><th>Committee</th><th>Attend</th><th></th></thead><tbody>`;
      meet.slice(-6).reverse().forEach(m => {
        html += `<tr><td style="font-weight:600;">${m.date}</td><td style="font-weight:500;">${m.type}</td><td style="font-weight:700;color:#fbbf24;">${m.attendance}</td><td><button onclick="delMeet(${m.id})" style="background:#ef4444; border:none; border-radius:20px; padding:6px 14px; color:white; cursor:pointer; font-weight:600;">🗑️</button></td></tr>`;
      });
      html += `</tbody></table>`;
      document.getElementById("recentMeetings").innerHTML = html;
    }
  }
  
  async function loadAllData() {
    allAttendance = await getAll("attendance");
    allMeetings = await getAll("meetings");
    attTotal = Math.ceil(allAttendance.length / 10) || 1;
    meetTotal = Math.ceil(allMeetings.length / 10) || 1;
    document.getElementById("dataStats").innerHTML = `✨ ${allAttendance.length} attendance records | ✨ ${allMeetings.length} meeting records`;
    renderAttendanceTable();
    renderMeetingsTable();
    updateDashboard();
  }
  
  function renderAttendanceTable() {
    let start = (attPage - 1) * 10;
    let pageData = allAttendance.slice(start, start + 10);
    let html = `<table style="width:100%"><thead><th>Date</th><th>Topic</th><th>Total</th><th></th></thead><tbody>`;
    pageData.forEach(r => {
      let t = 0; if(r.ministries) for(let k in r.ministries) t += (r.ministries[k]?.male||0) + (r.ministries[k]?.female||0);
      html += `<tr><td style="font-weight:600;">${r.date}</td><td>${r.topic?.slice(0,35)||'-'}</td><td style="font-weight:700;color:#fbbf24;">${t}</td><td><button onclick="delAtt(${r.id})" style="background:#ef4444; border:none; border-radius:20px; padding:4px 12px; color:white; cursor:pointer;">Del</button></td></tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById("attTable").innerHTML = html;
    document.getElementById("attPagination").innerHTML = `
      <button class="page-btn-glam" onclick="changeAttPage(${attPage-1})" ${attPage===1?'disabled':''}>◀ Prev</button>
      <span style="font-weight:600;">Page ${attPage} of ${attTotal}</span>
      <button class="page-btn-glam" onclick="changeAttPage(${attPage+1})" ${attPage===attTotal?'disabled':''}>Next ▶</button>
    `;
  }
  
  function renderMeetingsTable() {
    let start = (meetPage - 1) * 10;
    let pageData = allMeetings.slice(start, start + 10);
    let html = `<table style="width:100%"><thead><th>Date</th><th>Committee</th><th>Attendance</th><th></th></thead><tbody>`;
    pageData.forEach(m => {
      html += `<tr><td style="font-weight:600;">${m.date}</td><td>${m.type}</td><td style="font-weight:700;color:#fbbf24;">${m.attendance}</td><td><button onclick="delMeet(${m.id})" style="background:#ef4444; border:none; border-radius:20px; padding:4px 12px; color:white; cursor:pointer;">Del</button></td></tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById("meetTable").innerHTML = html;
    document.getElementById("meetPagination").innerHTML = `
      <button class="page-btn-glam" onclick="changeMeetPage(${meetPage-1})" ${meetPage===1?'disabled':''}>◀ Prev</button>
      <span style="font-weight:600;">Page ${meetPage} of ${meetTotal}</span>
      <button class="page-btn-glam" onclick="changeMeetPage(${meetPage+1})" ${meetPage===meetTotal?'disabled':''}>Next ▶</button>
    `;
  }
  
  window.changeAttPage = (page) => { if(page >= 1 && page <= attTotal){ attPage = page; renderAttendanceTable(); } };
  window.changeMeetPage = (page) => { if(page >= 1 && page <= meetTotal){ meetPage = page; renderMeetingsTable(); } };
  
  function updateDashboard() {
    let year = document.getElementById("yearFilter").value;
    let month = document.getElementById("monthFilter").value;
    let ministryFilter = document.getElementById("ministryFilter").value;
    
    let filtered = allAttendance.filter(r => {
      let d = new Date(r.date);
      if(year !== 'all' && d.getFullYear() != year) return false;
      if(month !== 'all' && (d.getMonth() + 1) != month) return false;
      return true;
    });
    
    let ministryTotals = {"Sunday School":0,"Ladies":0,"Men's":0,"Youth":0,"Wednesday Prayer":0,"Sunday Service":0,"Visitors":0};
    let maleTotal = 0, femaleTotal = 0;
    
    filtered.forEach(r => {
      let m = r.ministries || {};
      ministryTotals["Sunday School"] += (m.sundaySchool?.male||0) + (m.sundaySchool?.female||0);
      ministryTotals["Ladies"] += (m.ladies?.male||0) + (m.ladies?.female||0);
      ministryTotals["Men's"] += (m.men?.male||0) + (m.men?.female||0);
      ministryTotals["Youth"] += (m.youth?.male||0) + (m.youth?.female||0);
      ministryTotals["Wednesday Prayer"] += (m.wedPrayer?.male||0) + (m.wedPrayer?.female||0);
      ministryTotals["Sunday Service"] += (m.sundayService?.male||0) + (m.sundayService?.female||0);
      ministryTotals["Visitors"] += (m.visitors?.male||0) + (m.visitors?.female||0);
    });
    
    let totalAtt = Object.values(ministryTotals).reduce((a,b) => a + b, 0);
    maleTotal = filtered.reduce((sum, r) => {
      let m = r.ministries || {};
      return sum + (m.sundaySchool?.male||0)+(m.ladies?.male||0)+(m.men?.male||0)+(m.youth?.male||0)+(m.wedPrayer?.male||0)+(m.sundayService?.male||0)+(m.visitors?.male||0);
    }, 0);
    femaleTotal = filtered.reduce((sum, r) => {
      let m = r.ministries || {};
      return sum + (m.sundaySchool?.female||0)+(m.ladies?.female||0)+(m.men?.female||0)+(m.youth?.female||0)+(m.wedPrayer?.female||0)+(m.sundayService?.female||0)+(m.visitors?.female||0);
    }, 0);
    
    let chartData = Object.values(ministryTotals);
    let chartLabels = Object.keys(ministryTotals);
    if(ministryFilter !== "all") {
      let idx = chartLabels.indexOf(ministryFilter);
      if(idx !== -1) { chartData = [chartData[idx]]; chartLabels = [ministryFilter]; }
    }
    
    document.getElementById("attKpi").innerHTML = `
      <div class="kpi-card-glam"><div class="kpi-value-glam">${totalAtt}</div><div>Total Attendance</div></div>
      <div class="kpi-card-glam"><div class="kpi-value-glam">${filtered.length}</div><div>Events</div></div>
      <div class="kpi-card-glam"><div class="kpi-value-glam">👨 ${maleTotal}</div><div>👩 ${femaleTotal}</div></div>
    `;
    
    if(ministryChart) ministryChart.destroy();
    ministryChart = new Chart(document.getElementById("ministryChart"), {
      type: 'bar',
      data: { labels: chartLabels, datasets: [{ label: 'Attendance', data: chartData, backgroundColor: '#fbbf24', borderRadius: 12 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { datalabels: { formatter: v => v > 0 ? v : '' } } }
    });
    
    let monthly = {};
    filtered.forEach(r => {
      let d = new Date(r.date);
      if(!isNaN(d)) {
        let mo = d.getMonth() + 1;
        let t = 0; let m = r.ministries || {};
        for(let k in m) t += (m[k]?.male||0) + (m[k]?.female||0);
        monthly[mo] = (monthly[mo]||0) + t;
      }
    });
    let monthData = [];
    for(let i=1;i<=12;i++) monthData.push(monthly[i]||0);
    if(trendChart) trendChart.destroy();
    trendChart = new Chart(document.getElementById("trendChart"), {
      type: 'line',
      data: { labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], datasets: [{ label: 'Monthly Trend', data: monthData, borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.1)', fill: true, tension: 0.3 }] },
      options: { plugins: { datalabels: { align: 'top', formatter: v => v > 0 ? v : '' } } }
    });
    
    if(genderChart) genderChart.destroy();
    genderChart = new Chart(document.getElementById("genderChart"), {
      type: 'doughnut',
      data: { labels: ['Male', 'Female'], datasets: [{ data: [maleTotal, femaleTotal], backgroundColor: ['#3b82f6', '#ec489a'] }] },
      options: { plugins: { datalabels: { color: 'white', formatter: v => v > 0 ? v : '' } } }
    });
    
    let meetYear = document.getElementById("meetYearFilter").value;
    let meetMonth = document.getElementById("meetMonthFilter").value;
    let committeeFilter = document.getElementById("committeeFilter").value;
    
    let meetFiltered = allMeetings.filter(m => {
      let d = new Date(m.date);
      if(meetYear !== 'all' && d.getFullYear() != meetYear) return false;
      if(meetMonth !== 'all' && (d.getMonth() + 1) != meetMonth) return false;
      if(committeeFilter !== 'all' && m.type !== committeeFilter) return false;
      return true;
    });
    
    let committeeAgg = {};
    meetFiltered.forEach(m => { committeeAgg[m.type] = (committeeAgg[m.type]||0) + m.attendance; });
    let commLabels = Object.keys(committeeAgg);
    let commData = Object.values(committeeAgg);
    if(commLabels.length === 0) { commLabels = ["No Data"]; commData = [0]; }
    
    let totalMeetings = meetFiltered.length;
    let totalMeetAtt = meetFiltered.reduce((s,m) => s + m.attendance, 0);
    document.getElementById("meetKpi").innerHTML = `
      <div class="kpi-card-glam"><div class="kpi-value-glam">${totalMeetings}</div><div>Meetings</div></div>
      <div class="kpi-card-glam"><div class="kpi-value-glam">${totalMeetAtt}</div><div>Total Attendance</div></div>
      <div class="kpi-card-glam"><div class="kpi-value-glam">${totalMeetings ? Math.round(totalMeetAtt/totalMeetings) : 0}</div><div>Avg/Meeting</div></div>
    `;
    
    if(meetChart) meetChart.destroy();
    meetChart = new Chart(document.getElementById("meetChart"), {
      type: 'bar',
      data: { labels: commLabels, datasets: [{ label: 'Attendance', data: commData, backgroundColor: '#8b5cf6', borderRadius: 12 }] },
      options: { plugins: { datalabels: { formatter: v => v > 0 ? v : '' } } }
    });
    
    let meetMonthly = {};
    meetFiltered.forEach(m => {
      let d = new Date(m.date);
      if(!isNaN(d)) { let mo = d.getMonth() + 1; meetMonthly[mo] = (meetMonthly[mo]||0) + m.attendance; }
    });
    let meetMonthData = [];
    for(let i=1;i<=12;i++) meetMonthData.push(meetMonthly[i]||0);
    if(meetTrendChart) meetTrendChart.destroy();
    meetTrendChart = new Chart(document.getElementById("meetTrendChart"), {
      type: 'bar',
      data: { labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], datasets: [{ label: 'Meeting Attendance', data: meetMonthData, backgroundColor: '#06b6d4', borderRadius: 12 }] },
      options: { plugins: { datalabels: { align: 'top', formatter: v => v > 0 ? v : '' } } }
    });
    
    let committees = [...new Set(allMeetings.map(m => m.type))];
    let committeeSelect = document.getElementById("committeeFilter");
    committeeSelect.innerHTML = '<option value="all">All Committees</option>' + committees.map(c => `<option>${c}</option>`).join('');
  }
  
  async function populateFilters() {
    let years = [...new Set(allAttendance.map(a => new Date(a.date).getFullYear()).filter(y => !isNaN(y)))].sort((a,b)=>b-a);
    let yearSelect = document.getElementById("yearFilter");
    let meetYearSelect = document.getElementById("meetYearFilter");
    yearSelect.innerHTML = '<option value="all">All Years</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
    meetYearSelect.innerHTML = '<option value="all">All Years</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
    
    let months = '';
    for(let i=1;i<=12;i++) months += `<option value="${i}">${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][i-1]}</option>`;
    document.getElementById("monthFilter").innerHTML = '<option value="all">All Months</option>' + months;
    document.getElementById("meetMonthFilter").innerHTML = '<option value="all">All Months</option>' + months;
    
    let ministries = ["Sunday School", "Ladies", "Men's", "Youth", "Wednesday Prayer", "Sunday Service", "Visitors"];
    let ministrySelect = document.getElementById("ministryFilter");
    ministrySelect.innerHTML = '<option value="all">All Ministries</option>' + ministries.map(m => `<option>${m}</option>`).join('');
  }
  
  document.querySelectorAll('.activity-opt-glam').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.activity-opt-glam').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      let type = opt.getAttribute('data-type');
      document.getElementById("attendanceForm").classList.toggle('hidden', type !== 'attendance');
      document.getElementById("meetingForm").classList.toggle('hidden', type !== 'meeting');
    });
  });
  
  document.querySelectorAll('.tab-glam').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab-glam').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
      document.getElementById(tab.getAttribute('data-tab') + 'Tab').classList.remove('hidden');
      if(tab.getAttribute('data-tab') === 'dashboard') updateDashboard();
      if(tab.getAttribute('data-tab') === 'data') loadAllData();
    });
  });
  
  document.getElementById("applyFilters").addEventListener("click", updateDashboard);
  document.getElementById("applyMeetFilters").addEventListener("click", updateDashboard);
  document.getElementById("refreshData").addEventListener("click", () => { loadAllData(); showToast("Data refreshed"); });
  document.getElementById("fetchGoogleData").addEventListener("click", async () => {
    showToast("🔄 Fetching from Google Drive...");
    try {
      const response = await fetch(GOOGLE_SHEET_URL);
      const csvText = await response.text();
      const rows = csvText.split('\n').filter(row => row.trim());
      if(rows.length >= 2) {
        showToast(`✅ Imported ${rows.length-1} records from Google Drive`);
        await loadAllData();
      } else { showToast("No data found in Google Drive"); }
    } catch(e) { showToast("Could not fetch from Google Drive"); }
  });
  document.getElementById("exportExcel").addEventListener("click", () => {
    const attData = allAttendance.map(r => {
      let t = 0; if(r.ministries) for(let k in r.ministries) t += (r.ministries[k]?.male||0) + (r.ministries[k]?.female||0);
      return { Date: r.date, Topic: r.topic || '-', Total_Attendance: t };
    });
    const meetData = allMeetings.map(m => ({ Date: m.date, Committee: m.type, Attendance: m.attendance, Objectives: m.objectives, Outcomes: m.outcomes }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(attData), "Attendance");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(meetData), "Meetings");
    XLSX.writeFile(wb, `MPAC_Data_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast("📊 Exported to Excel!");
  });
  
  localStorage.setItem("deviceId", localStorage.getItem("deviceId") || `MPAC_${Date.now()}`);
  
  openDB().then(async () => {
    await loadAllData();
    await renderRecent();
    await populateFilters();
    genderSec.classList.add("hidden");
    showToast("✨ MPAC DataHub Ultimate Ready! Data pushes to Google Drive on save.");
  });
</script>
</body>
</html>
