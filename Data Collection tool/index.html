<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=1.0">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MPAC DataHub | Premium Analytics with Charts & Filters</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    /* Your existing beautiful styles remain unchanged */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --patriot-blue: #003366;
      --patriot-red: #b22234;
      --patriot-gold: #ffd700;
      --patriot-white: #ffffff;
      --patriot-crimson: #8b0000;
      --shadow-lg: 0 20px 35px -10px rgba(0,0,0,0.3);
      --shadow-md: 0 8px 20px rgba(0,0,0,0.2);
      --radius-2xl: 2rem;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--patriot-blue) 0%, #00264d 40%, var(--patriot-red) 100%);
      min-height: 100vh;
      color: var(--patriot-white);
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('https://i.imgur.com/kTumLOY.jpg');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 70% auto;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }
    /* ... rest of your beautiful CSS remains the same ... */
    /* (I kept all your premium styles intact) */
  </style>
</head>
<body>
<div class="container">
  <!-- Your existing beautiful HTML structure remains unchanged -->
  <!-- ... (all your premium-header, nav, recordPage, dashboardPage, etc.) ... -->

  <!-- DRIVE SYNC PAGE (important for configuration) -->
  <div id="drivePage" class="tab-pane">
    <div class="glass-card">
      <div class="card-header-premium"><h2><i class="fab fa-google-drive"></i> Google Sheets Sync</h2></div>
      <div class="card-body-premium">
        <div style="background:rgba(0,0,0,0.3); border-radius:24px; padding:20px; margin-bottom:20px;">
          <label class="form-label"><i class="fas fa-link"></i> Apps Script Web App URL</label>
          <input type="text" id="webhookUrl" class="form-control" placeholder="https://script.google.com/macros/s/.../exec" value="https://script.google.com/macros/s/AKfycbybZg7o3EOqi5jdbuFBvxirFSrRb8FTE4NpUV4GAxbZkA8qq1Ily1ZuvxWi_peJXMjVBg/exec">
          <small style="display:block; margin-top:8px; opacity:0.7;">Paste your deployed Google Apps Script URL for real-time sync</small>
        </div>
        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
          <button id="testConnectionBtn" class="btn-outline"><i class="fas fa-plug"></i> Test Connection</button>
          <button id="pullFromDriveBtn" class="btn-outline"><i class="fas fa-download"></i> Pull from Sheet</button>
          <button id="syncNowBtn" class="btn-outline"><i class="fas fa-sync-alt"></i> Full Sync</button>
        </div>
        <div id="syncStatusMessage" style="background:rgba(0,0,0,0.3); border-radius:20px; padding:16px;"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast-premium" id="toastMsg">MPAC DataHub Ready</div>

<script>
  // Register Chart.js plugin
  Chart.register(ChartDataLabels);
  Chart.defaults.set('plugins.datalabels', { 
    color: '#ffd700', 
    anchor: 'end', 
    align: 'top', 
    font: { weight: 'bold', size: 10 } 
  });

  // ==================== GOOGLE SHEETS SYNC CONFIG ====================
  let WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbybZg7o3EOqi5jdbuFBvxirFSrRb8FTE4NpUV4GAxbZkA8qq1Ily1ZuvxWi_peJXMjVBg/exec";

  let allAttendance = [];
  let allMeetings = [];
  let charts = {};

  // Your existing ministryMap and allMinistriesList remain the same
  const ministryMap = { 
    sundaySchool: { maleId:"ssMale", femaleId:"ssFemale", title:"Sunday School", showTopic:true, showOffering:true },
    ladies: { maleId:"lfMale", femaleId:"lfFemale", title:"Ladies Fellowship", showTopic:true, showOffering:true },
    men: { maleId:"mfMale", femaleId:"mfFemale", title:"Men's Fellowship", showTopic:true, showOffering:true },
    youth: { maleId:"yfMale", femaleId:"yfFemale", title:"Youth Fellowship", showTopic:true, showOffering:true },
    wednesday: { maleId:"wpMale", femaleId:"wpFemale", title:"Wednesday Prayer", showTopic:true, showOffering:true },
    sunday: { maleId:"sunMale", femaleId:"sunFemale", title:"Sunday Service", showTopic:true, showOffering:true },
    visitors: { maleId:"visitorsMale", femaleId:"visitorsFemale", title:"Visitors", showTopic:false, showOffering:true },
    bibleStudy: { maleId:"bibleStudyMale", femaleId:"bibleStudyFemale", title:"Bible Study", showTopic:true, showOffering:false },
    couples: { maleId:"couplesMale", femaleId:"couplesFemale", title:"Couples Fellowship", showTopic:true, showOffering:true },
    singleParents: { maleId:"singleParentsMale", femaleId:"singleParentsFemale", title:"Single Parents", showTopic:true, showOffering:true }
  };

  const allMinistriesList = ['Sunday School', 'Ladies Fellowship', 'Men\'s Fellowship', 'Youth Fellowship', 'Wednesday Prayer', 'Sunday Service', 'Visitors / Guests', 'Bible Study', 'Couples Fellowship', 'Single Parents'];

  // ==================== UTILITIES ====================
  function showToast(msg) { 
    let t = document.getElementById("toastMsg"); 
    t.innerText = msg; 
    t.style.display = "block"; 
    setTimeout(() => t.style.display = "none", 2800); 
  }

  // ==================== SYNC FUNCTION (Aligned with your Apps Script) ====================
  async function autoSyncRemote(data, type) {
    const payload = {
      type: type,
      data: data,
      timestamp: new Date().toISOString()
    };

    console.log(`🔄 Sending ${type} to Google Sheets...`, payload);

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      console.log(`✅ ${type} sync request sent`);
      showToast(`✅ ${type} saved to Google Sheet`);
    } catch (err) {
      console.error(`❌ Sync failed for ${type}:`, err);
      showToast(`⚠️ Failed to sync ${type}`);
    }
  }

  // ==================== Your existing IndexedDB, loadAllData, render functions, etc. remain the same ====================
  // (Keep all your existing code for IndexedDB, renderAttendanceDashboard, renderOfferingDashboard, etc.)

  // Update the form submit handlers to use the new sync function
  async function saveAttendance(data) {
    await autoSyncRemote(data, "attendance");
    // Your existing local storage logic
    await addItem("attendance", data);
    await loadAllData();
    await refreshAllDashboards();
    await renderDataTables();
    await renderRecent();
  }

  async function saveMeeting(data) {
    await autoSyncRemote(data, "meeting");
    await addItem("meetings", data);
    await loadAllData();
    await refreshAllDashboards();
    await renderDataTables();
    await renderRecent();
  }

  // Initialize
  async function init() {
    await openDB();
    await loadAllData();
    initFormHandlers();
    initNavHandlers();
    initButtonHandlers();
    populateYearFilters();
    document.getElementById("attDate").value = new Date().toISOString().slice(0,10);
    document.getElementById("meetingDate").value = new Date().toISOString().slice(0,10);
    await refreshAllDashboards();
    await renderDataTables();
    await renderRecent();
    showToast("✨ MPAC DataHub Premium Ready");
  }

  init();
</script>
</body>
</html>
